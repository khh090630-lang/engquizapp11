<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 영어 문제 은행</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* 미래적인 대시보드 UI 디자인 스타일 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            color: #e0f8ff; 
            padding: 40px 20px; 
            margin: 0;
            min-height: 100vh;
        }
        .container { max-width: 950px; margin: 0 auto; }
        
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.1); 
        }
        
        h2 { 
            margin-top: 0;
            font-weight: 800;
            background: linear-gradient(to right, #6ee7b7, #3b82f6); 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none; 
            border-bottom: 1px solid rgba(255,255,255,0.2); 
            padding-bottom: 15px; 
            letter-spacing: -0.5px;
        }

        input[type="text"], input[type="number"], textarea {
            width: 100%; box-sizing: border-box;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(0, 242, 254, 0.3);
            color: #e0f8ff; 
            text-shadow: 0 0 5px rgba(0, 242, 254, 0.5); 
            padding: 12px;
            border-radius: 8px; margin-bottom: 15px;
            font-family: inherit; font-size: 15px; font-weight: bold;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
            background: rgba(15, 23, 42, 0.8);
        }

        button { 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white; border: none; padding: 12px 20px; border-radius: 8px; 
            cursor: pointer; font-size: 15px; font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(0, 242, 254, 0.6); }
        .btn-create { width: 100%; background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4); }
        
        .batch-control { display: flex; gap: 10px; align-items: center; background: rgba(0, 242, 254, 0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(0,242,254,0.1);}
        .passage-row { display: grid; grid-template-columns: 30px 1fr 130px 60px; align-items: center; padding: 12px; border-bottom: 1px solid rgba(0,242,254,0.1); gap: 10px; }
        .header-row { background: rgba(0, 0, 0, 0.4); font-weight: bold; border-radius: 12px 12px 0 0; border: none; }
        
        .passage-title { font-size: 14px; font-weight: bold; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; letter-spacing: 0.5px;}
        .opt-label { font-size: 13px; color: #a5f3fc; font-weight: bold; } 
        
        .input-group { display: flex; gap: 8px; justify-content: flex-end; align-items: center;}
        .input-group input { width: 50px; padding: 6px; margin: 0; text-align: center; }
        .btn-group { display: flex; gap: 6px; }
        .btn-sm { padding: 8px; font-size: 13px; border-radius: 6px; flex: 1;}
        .btn-edit { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); color: #333; text-shadow: none; }
        .btn-del { background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%); text-shadow: none; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-box { width: 100%; max-width: 600px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }
        .btn-cancel { background: transparent; border: 1px solid #00f2fe; color: #00f2fe; }

        /* ========================================================
           [중요] 인쇄용 문제지 영역 - 실전 모의고사 2단 레이아웃 완전 통제
           ======================================================== */
        #quiz-output { 
            padding: 40px 50px; 
            background: white; 
            color: black; 
            border-radius: 12px; 
            display: none; 
            margin-top: 30px;
            text-shadow: none; 
            font-family: 'Batang', 'Malgun Gothic', serif; 
            width: 100%;
            box-sizing: border-box;
        }
        #quiz-output * { 
            color: #000; 
            text-shadow: none !important; 
            box-sizing: border-box;
        }

        /* 신문/시험지 형태의 정밀 다단 레이아웃 */
        .exam-paper {
            column-count: 2;            /* 정확히 좌우 2단으로 고정 */
            column-gap: 50px;           /* 왼쪽단과 오른쪽단 사이의 넓은 여백 */
            column-rule: 1px solid #bbb; /* 중앙을 가르는 깔끔한 시험지 실선 */
            column-fill: auto;          /* 내용이 왼쪽을 다 채워야 오른쪽으로 넘어가게 설정 */
            width: 100%;
        }

        .q-box { 
            display: block;
            width: 100%;
            /* 핵심: 이전 문제가 언제 끝나든, 새 문제는 무조건 다음 칸(단)의 첫머리에서 시작 */
            break-before: column; 
            -webkit-column-break-before: always; 
            break-inside: auto;        /* 만약 지문이 너무 길면 우측 단이나 다음 페이지로 자연스럽게 연속 연결 */
            page-break-inside: auto;
            margin-bottom: 0;
            padding-bottom: 25px;
            font-size: 11px;            /* 실제 시험지처럼 글자 크기 대폭 축소 */
            line-height: 1.5;           /* 자간 및 가독성 최적화 */
        }

        .q-title { font-weight: bold; font-size: 12.5px; display: block; margin-bottom: 4px; color: #000; }
        .q-direction { margin: 0 0 8px 0; font-size: 11px; color: #222; }
        
        /* [네모 박스] 주어진 글 / 삽입 문장 스타일 */
        .box-content { 
            border: 1px solid #000; 
            padding: 8px 12px; 
            margin: 8px 0; 
            background: #fff; 
            text-align: left; 
            font-size: 11px; 
            font-weight: normal; 
        }
        .q-text { text-align: justify; margin-top: 8px; word-break: break-word; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>✨ 1. 新 지문 데이터 등록</h2>
            <input type="text" id="title" placeholder="지문 제목 (예: 24년 3월 고2 31번)">
            <textarea id="content" rows="4" placeholder="여기에 영어 문장을 줄바꿈으로 구분하여 입력하세요..."></textarea>
            <button id="save-btn" onclick="saveToDB()" style="width: 100%;">DB에 업로드하기</button>
        </div>

        <div class="card">
            <h2>🎯 2. 지문 관리 및 출제 설정</h2>
            <div class="batch-control">
                <span style="font-weight:bold; color:#a5f3fc;">⚡ 전체 문항수 일괄 적용:</span>
                <input type="number" id="global-order" placeholder="순서배열" value="1" style="width:70px; margin:0;">
                <input type="number" id="global-insert" placeholder="문장삽입" value="1" style="width:70px; margin:0;">
                <button onclick="applyGlobal()" style="background: rgba(0, 242, 254, 0.2); color: #a5f3fc; border: 1px solid #00f2fe;">적용</button>
            </div>
            
            <div class="passage-row header-row">
                <input type="checkbox" id="select-all" onclick="toggleSelectAll()">
                <span>전체 선택 및 지문 목록</span>
                <span style="text-align:right;">유형별 문항 수</span>
                <span style="text-align:center;">관리</span>
            </div>
            <div id="passage-list">
                <p style="text-align:center; padding:20px; color:#a5f3fc; font-weight:bold;">서버에서 데이터를 불러오는 중입니다...</p>
            </div>
            <button onclick="generateIntegratedQuiz()" class="btn-create" style="margin-top:20px;">🚀 선택한 지문으로 문제지 생성</button>
        </div>

        <div id="quiz-output"></div>
        <button id="pdf-btn" onclick="downloadPDF()" style="display: none; width:100%; margin-top:20px; background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); border:none; color:white;">
            📄 완성된 문제지 PDF 다운로드
        </button>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="card modal-box">
            <h2>✏️ 저장된 지문 수정하기</h2>
            <input type="hidden" id="edit-id">
            <input type="text" id="edit-title" placeholder="지문 제목">
            <textarea id="edit-content" rows="8" placeholder="문장을 로딩중입니다..."></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeEditModal()">취소</button>
                <button class="btn-save" id="edit-submit-btn" onclick="submitEdit()">수정 내용 덮어쓰기</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzyw9b4x6WdweTdues9-Lg8phnf-Z0U8GGTQB3NHlH8OpAajCDJaMtLGFKVcFkkyBac/exec";

        window.onload = async () => {
            try {
                const res = await fetch(GAS_URL + "?action=list");
                const list = await res.json();
                const container = document.getElementById('passage-list');
                container.innerHTML = "";
                
                if(list.length === 0) {
                    container.innerHTML = "<p style='text-align:center; color:#a5f3fc; padding:20px; font-weight:bold;'>등록된 지문이 없습니다.</p>";
                    return;
                }

                list.forEach(item => {
                    container.innerHTML += `
                        <div class="passage-row">
                            <input type="checkbox" class="chk-item" value="${item.id}">
                            <span class="passage-title">${item.title}</span>
                            <div class="input-group">
                                <label class="opt-label">순서</label>
                                <input type="number" class="order-cnt" value="1" min="0">
                                <label class="opt-label" style="margin-left:5px;">삽입</label>
                                <input type="number" class="insert-cnt" value="1" min="0">
                            </div>
                            <div class="btn-group">
                                <button class="btn-sm btn-edit" onclick="openEditModal('${item.id}')">수정</button>
                                <button class="btn-sm btn-del" onclick="deletePassage('${item.id}')">삭제</button>
                            </div>
                        </div>`;
                });
            } catch (err) {
                document.getElementById('passage-list').innerHTML = "<p style='text-align:center; color:#ffb199; padding:20px; font-weight:bold;'>서버 통신 오류가 발생했습니다.</p>";
            }
        };

        function toggleSelectAll() {
            const isChecked = document.getElementById('select-all').checked;
            document.querySelectorAll('.chk-item').forEach(chk => chk.checked = isChecked);
        }

        function applyGlobal() {
            const order = document.getElementById('global-order').value;
            const insert = document.getElementById('global-insert').value;
            document.querySelectorAll('.passage-row').forEach(row => {
                row.querySelector('.order-cnt').value = order;
                row.querySelector('.insert-cnt').value = insert;
            });
        }

        async function saveToDB() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const saveBtn = document.getElementById('save-btn');
            if(!title || !content) return alert("제목과 내용을 모두 입력해주세요.");
            
            saveBtn.innerText = "업로드 중입니다...";
            saveBtn.disabled = true;
            try {
                await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "save", title, content }) });
                location.reload(); 
            } catch (e) { alert("저장에 실패했습니다."); } finally { saveBtn.innerText = "DB에 업로드하기"; saveBtn.disabled = false; }
        }

        async function deletePassage(id) {
            if(!confirm("이 지문을 완전히 삭제하시겠습니까?")) return;
            try {
                await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "delete", id: id }) });
                location.reload();
            } catch (e) { alert("삭제 오류"); }
        }

        async function openEditModal(id) {
            document.getElementById('edit-modal').style.display = 'flex';
            document.getElementById('edit-title').value = "로딩 중...";
            document.getElementById('edit-content').value = "";
            document.getElementById('edit-id').value = id;
            try {
                const res = await fetch(GAS_URL + "?action=get_passage&id=" + id);
                const data = await res.json();
                document.getElementById('edit-title').value = data.title;
                document.getElementById('edit-content').value = data.content;
            } catch(e) { closeEditModal(); }
        }

        function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }

        async function submitEdit() {
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('edit-title').value;
            const content = document.getElementById('edit-content').value;
            if(!title || !content) return;
            document.getElementById('edit-submit-btn').disabled = true;
            try {
                await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "update", id, title, content }) });
                location.reload();
            } catch (e) { document.getElementById('edit-submit-btn').disabled = false; }
        }

        async function generateIntegratedQuiz() {
            const selected = [];
            document.querySelectorAll('.chk-item:checked').forEach(chk => {
                const row = chk.closest('.passage-row');
                selected.push({ id: chk.value, order: row.querySelector('.order-cnt').value, insert: row.querySelector('.insert-cnt').value });
            });
            if(selected.length === 0) return alert("출제할 지문을 체크박스로 선택해주세요.");

            const quizDiv = document.getElementById('quiz-output');
            quizDiv.innerHTML = "<h3 style='text-align:center;'>AI가 문제를 생성하고 있습니다... ⚙️</h3>";
            quizDiv.style.display = "block";

            try {
                const res = await fetch(GAS_URL, { 
                    method: "POST", 
                    headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                    body: JSON.stringify({ action: "generate_batch", passages: selected }) 
                });
                const result = await res.json();
                
                // 다단 포맷(.exam-paper) 클래스로 묶어서 출력 처리
                quizDiv.innerHTML = `<div class="exam-paper">${result.html_content}</div>`;
                document.getElementById('pdf-btn').style.display = "block";
            } catch(e) {
                quizDiv.innerHTML = "<p style='color:red;'>오류가 발생했습니다.</p>";
            }
        }

        function downloadPDF() {
            window.scrollTo(0, 0);
            html2pdf().set({ 
                margin: [15, 12, 15, 12], 
                filename: '영어_변형문제지.pdf', 
                html2canvas: { scale: 2, useCORS: true }, 
                jsPDF: { format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['css', 'legacy'] }
            }).from(document.getElementById('quiz-output')).save();
        }
    </script>
</body>
</html>
