<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>영어 문제 은행 (GAS 연동)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
        label { font-weight: bold; display: block; margin: 15px 0 5px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; width: 100%; font-weight: bold;}
        button:hover { opacity: 0.9; }
        #preview-box { display: none; background: #e8f4f8; padding: 15px; margin-top: 15px; border-radius: 4px; font-size: 14px; border: 1px solid #bce8f1; color: #31708f;}
        #quiz-output { padding: 30px; background: white; margin-top: 20px; border: 1px solid #ddd; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>💾 1. 새 지문 DB에 등록하기</h2>
            <label>지문 제목</label>
            <input type="text" id="title" placeholder="예: 24년 3월 고2 31번">
            <label>지문 내용 (문장 단위 줄바꿈)</label>
            <textarea id="content" rows="5" placeholder="영어 문장을 입력하세요."></textarea>
            <button id="save-btn" onclick="saveToDB()">DB에 영구 저장하기</button>
        </div>

        <div class="card">
            <h2>📝 2. 저장된 지문 불러와서 문제 만들기</h2>
            <label>DB에서 지문 선택 (이전에 저장한 지문들)</label>
            <select id="passage-select" onchange="loadPreview()">
                <option value="">지문을 불러오는 중...</option>
            </select>

            <div id="preview-box"></div>

            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <div style="flex:1;">
                    <label>순서 배열 문제 수</label>
                    <input type="number" id="order_cnt" value="1" min="0">
                </div>
                <div style="flex:1;">
                    <label>문장 삽입 문제 수</label>
                    <input type="number" id="insert_cnt" value="1" min="0">
                </div>
            </div>

            <button onclick="generateQuiz()" style="background-color: #2980b9;">문제 생성하기</button>
        </div>

        <div id="quiz-output"></div>
        <button id="pdf-btn" onclick="downloadPDF()" style="display: none; background-color: #e74c3c;">📄 PDF로 다운로드</button>
    </div>

    <script>
        // 발급받은 URL 유지
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxJp8f3L3r2i_mjWLWnpv8hYmItZ9mA73jTGJscNtLNshaqyZJk1oBn7dPl3NdpFwMB/exec";

        window.onload = async () => {
            try {
                const res = await fetch(GAS_URL + "?action=list");
                const list = await res.json();
                const select = document.getElementById('passage-select');
                select.innerHTML = '<option value="">지문을 선택하세요</option>';
                list.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.id;
                    opt.text = item.title;
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error("목록 불러오기 실패:", err);
            }
        };

        async function loadPreview() {
            const passage_id = document.getElementById('passage-select').value;
            const previewBox = document.getElementById('preview-box');
            
            if(!passage_id) {
                previewBox.style.display = 'none';
                return;
            }
            
            previewBox.style.display = 'block';
            previewBox.innerHTML = "<i>스프레드시트에서 지문을 불러오는 중입니다... 🔄</i>";

            try {
                const res = await fetch(GAS_URL + "?action=get_passage&passage_id=" + passage_id);
                const data = await res.json();
                previewBox.innerHTML = "<b>[불러온 지문 원문]</b><br><br>" + data.sentences.join(" ");
            } catch (err) {
                previewBox.innerHTML = "<span style='color:red;'>지문을 불러오는데 실패했습니다.</span>";
            }
        }

        // ★ 무한 로딩 방지 및 에러 핸들링이 추가된 저장 로직
        async function saveToDB() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const saveBtn = document.getElementById('save-btn');

            if(!title || !content) return alert("제목과 내용을 모두 입력해주세요.");

            saveBtn.innerText = "저장 중... 잠시만 기다려주세요.";
            saveBtn.disabled = true;

            try {
                const res = await fetch(GAS_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: "save", title, content })
                });
                
                // 서버로부터의 응답을 먼저 텍스트로 받음
                const responseText = await res.text(); 
                
                try {
                    // 정상적인 JSON 응답인지 파싱
                    const result = JSON.parse(responseText);
                    
                    if(result.status === "error") {
                        alert(result.message); // 시트 이름을 못 찾았을 때 띄워줄 에러
                    } else {
                        alert(result.message); // 성공 메시지
                        location.reload(); 
                    }
                } catch(parseErr) {
                    // JSON이 아니면(에러 페이지 반환 시) 무한 로딩 방지
                    console.error("구글 서버 에러 응답:", responseText);
                    alert("구글 Apps Script 권한 오류입니다. 배포 설정에서 접근 권한이 '모든 사용자'인지 확인해주세요.");
                }
            } catch (networkErr) {
                alert("네트워크 연결 오류가 발생했습니다.");
            } finally {
                // 어떤 경우든 마지막엔 버튼 원래 상태로 복구
                saveBtn.innerText = "DB에 영구 저장하기";
                saveBtn.disabled = false;
            }
        }

        async function generateQuiz() {
            const passage_id = document.getElementById('passage-select').value;
            const order_cnt = document.getElementById('order_cnt').value;
            const insert_cnt = document.getElementById('insert_cnt').value;
            
            if(!passage_id) return alert("지문을 선택해주세요.");

            document.getElementById('quiz-output').innerHTML = "문제 조립 중... ⚙️";
            document.getElementById('quiz-output').style.display = "block";

            try {
                const res = await fetch(GAS_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: "generate", passage_id, order_cnt, insert_cnt })
                });
                const result = await res.json();
                
                if(result.status === "success") {
                    document.getElementById('quiz-output').innerHTML = result.html_content;
                    document.getElementById('pdf-btn').style.display = "block";
                } else {
                    alert(result.message);
                }
            } catch (err) {
                alert("문제 생성 중 오류가 발생했습니다.");
            }
        }

        function downloadPDF() {
            const element = document.getElementById('quiz-output');
            const opt = {
                margin:       15,
                filename:     '영어변형문제.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
