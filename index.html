<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 영어 문제 은행</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* 기본 UI 디자인 유지 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            color: #e0f8ff; 
            padding: 40px 20px; 
            margin: 0;
            min-height: 100vh;
        }
        .container { max-width: 950px; margin: 0 auto; }
        
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h2 { 
            margin-top: 0;
            font-weight: 800;
            background: linear-gradient(to right, #6ee7b7, #3b82f6); 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 1px solid rgba(255,255,255,0.2); 
            padding-bottom: 15px; 
        }

        input[type="text"], input[type="number"], textarea, select {
            width: 100%; box-sizing: border-box;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(0, 242, 254, 0.3);
            color: #e0f8ff; 
            padding: 12px;
            border-radius: 8px; margin-bottom: 15px;
            font-family: inherit; font-size: 15px; font-weight: bold;
        }
        select option { background: #1e293b; color: #e0f8ff; }

        input:focus, textarea:focus, select:focus {
            outline: none; border-color: #00f2fe; background: rgba(15, 23, 42, 0.8);
        }

        button { 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white; border: none; padding: 12px 20px; border-radius: 8px; 
            cursor: pointer; font-size: 15px; font-weight: bold;
        }
        button:hover { transform: translateY(-2px); }
        .btn-create { width: 100%; background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); }
        .btn-outline { background: rgba(0, 242, 254, 0.1); color: #00f2fe; border: 1px solid #00f2fe; box-shadow: none; }
        .btn-outline:hover { background: rgba(0, 242, 254, 0.2); }
        
        .batch-control { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; background: rgba(0, 242, 254, 0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(0,242,254,0.1);}
        .batch-group { display: flex; align-items: center; gap: 8px; }
        .passage-row { display: grid; grid-template-columns: 30px 1fr 140px 110px; align-items: center; padding: 15px; border-bottom: 1px solid rgba(0,242,254,0.1); gap: 15px; background: rgba(0,0,0,0.15); }
        .header-row { background: rgba(0, 0, 0, 0.4); font-weight: bold; border-radius: 12px 12px 0 0; border: none; margin-top: 15px; }
        
        .passage-title { font-size: 15px; font-weight: 600; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;}
        .opt-label { font-size: 13px; color: #a5f3fc; font-weight: bold; } 
        
        .input-group { display: flex; gap: 8px; justify-content: flex-end; align-items: center;}
        .input-group input { width: 50px; padding: 6px; margin: 0; text-align: center; }
        .btn-group { display: flex; gap: 6px; }
        .btn-sm { padding: 8px; font-size: 13px; border-radius: 6px; flex: 1;}
        .btn-edit { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); color: #333; }
        .btn-del { background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-box { width: 100%; max-width: 600px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }
        .btn-cancel { background: transparent; border: 1px solid #00f2fe; color: #00f2fe; }

        /* ========================================================
           폴더 아코디언(접기/펴기) 관련 스타일
           ======================================================== */
        .folder-header {
            background: rgba(0,0,0,0.4); 
            padding: 12px 15px; 
            margin-top: 15px; 
            border-radius: 8px 8px 0 0; 
            color: #6ee7b7; 
            font-weight: bold; 
            border: 1px solid rgba(0,242,254,0.1); 
            border-bottom: none;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s ease;
        }
        .folder-header:hover {
            background: rgba(0, 0, 0, 0.6);
        }
        .folder-content {
            display: block; 
        }
        .toggle-icon {
            font-size: 12px;
            transition: transform 0.3s ease;
        }
        .folder-header.collapsed .toggle-icon {
            transform: rotate(-90deg); 
        }

        /* 인쇄용 문제지 1단(Single Column) 구조 유지 */
        #quiz-output { 
            padding: 40px; background: white; color: black; border-radius: 12px; display: none; margin-top: 30px;
            font-family: 'Batang', 'Malgun Gothic', serif; width: 100%; max-width: 800px; margin-left: auto; margin-right: auto; box-sizing: border-box;
        }
        #quiz-output * { color: #000; text-shadow: none !important; box-sizing: border-box; }
        .main-title { text-align: center; font-size: 22px; font-weight: 800; margin-top: 0; margin-bottom: 30px; letter-spacing: 1.5px; }
        .exam-paper { display: block; width: 100%; }
        .q-box { display: block; width: 100%; break-inside: avoid; page-break-inside: avoid; margin-bottom: 45px; padding-bottom: 10px; font-size: 13.5px; line-height: 1.6; }
        .q-title { font-weight: bold; font-size: 14.5px; display: block; margin-bottom: 6px; color: #000; }
        .q-direction { margin: 0 0 10px 0; font-size: 13.5px; color: #111; }
        .box-content { border: 1px solid #000; padding: 12px 15px; margin: 15px 0; background: #fff; text-align: justify; font-size: 14px; font-weight: normal; }
        .q-text { text-align: justify; margin-top: 10px; word-break: keep-all; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>✨ 1. 새로운 지문 데이터 등록</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <select id="folder" style="margin-bottom: 0; flex: 1;">
                    <option value="미분류">미분류</option>
                </select>
                <button class="btn-outline" onclick="createNewFolder()" style="width: 120px;">+ 새 폴더</button>
            </div>
            
            <input type="text" id="title" placeholder="지문 제목 (예: 24년 3월 고2 31번)">
            <textarea id="content" rows="4" placeholder="여기에 영어 문장을 줄바꿈으로 구분하여 입력하세요..."></textarea>
            <button id="save-btn" onclick="saveToDB()" style="width: 100%;">DB에 업로드하기</button>
        </div>

        <div class="card">
            <h2>🎯 2. 지문 관리 및 출제 설정</h2>
            
            <div class="batch-control">
                <div class="batch-group">
                    <span style="font-weight:bold; color:#a5f3fc;">⚡ 출제수 일괄 적용:</span>
                    <input type="number" id="global-order" placeholder="순서" value="1" style="width:50px; margin:0;">
                    <input type="number" id="global-insert" placeholder="삽입" value="1" style="width:50px; margin:0;">
                    <button class="btn-outline" onclick="applyGlobal()" style="padding:10px;">적용</button>
                </div>
                
                <div style="width: 1px; height: 30px; background: rgba(0,242,254,0.2); margin: 0 5px;"></div>
                
                <div class="batch-group">
                    <span style="font-weight:bold; color:#a5f3fc;">📁 선택지문 폴더이동:</span>
                    <select id="bulk-folder" style="width: 140px; margin:0;">
                        <option value="미분류">미분류</option>
                    </select>
                    <button class="btn-outline" onclick="moveSelectedToFolder()" style="padding:10px;">이동</button>
                </div>
            </div>
            
            <div class="passage-row header-row" style="margin-top:0;">
                <input type="checkbox" id="select-all" onclick="toggleSelectAll()">
                <span>전체 선택 (아래 전체 적용)</span>
                <span style="text-align:right;">유형별 문항 수</span>
                <span style="text-align:center;">관리</span>
            </div>
            
            <div id="passage-list">
                <p style="text-align:center; padding:20px; color:#a5f3fc; font-weight:bold;">서버에서 데이터를 불러오는 중입니다...</p>
            </div>
            <button onclick="generateIntegratedQuiz()" class="btn-create" style="margin-top:30px;">🚀 선택한 지문으로 문제지 생성</button>
        </div>

        <div id="quiz-output"></div>
        <button id="pdf-btn" onclick="downloadPDF()" style="display: none; width:100%; margin-top:20px; background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); border:none; color:white;">
            📄 완성된 문제지 PDF 다운로드
        </button>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="card modal-box">
            <h2>✏️ 저장된 지문 수정하기</h2>
            <input type="hidden" id="edit-id">
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <select id="edit-folder" style="margin-bottom: 0; flex: 1;">
                    <option value="미분류">미분류</option>
                </select>
                <button class="btn-outline" onclick="createNewFolder()" style="width: 120px;">+ 새 폴더</button>
            </div>
            
            <input type="text" id="edit-title" placeholder="지문 제목">
            <textarea id="edit-content" rows="8" placeholder="문장을 로딩중입니다..."></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeEditModal()">취소</button>
                <button class="btn-save" id="edit-submit-btn" onclick="submitEdit()">수정 내용 덮어쓰기</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw39M87aqUxLEArYg9yvcKfU_IAvfyB08ZHIM4k2hyQ5CrcU_kSHi0f_19CBM08SQ4c/exec";
        
        let globalFolders = new Set(["미분류"]);

        window.onload = async () => {
            try {
                const res = await fetch(GAS_URL + "?action=list");
                const list = await res.json();
                const container = document.getElementById('passage-list');
                container.innerHTML = "";
                
                if(list.length === 0) {
                    container.innerHTML = "<p style='text-align:center; color:#a5f3fc; padding:20px; font-weight:bold;'>등록된 지문이 없습니다.</p>";
                    updateFolderDropdowns();
                    return;
                }

                const folders = {};
                list.forEach(item => {
                    const f = item.folder || "미분류";
                    globalFolders.add(f); 
                    if(!folders[f]) folders[f] = [];
                    folders[f].push(item);
                });
                
                updateFolderDropdowns();

                let htmlStr = "";
                let folderIndex = 0;
                
                for (const [folderName, items] of Object.entries(folders)) {
                    const headerId = `folder-header-${folderIndex}`;
                    const contentId = `folder-content-${folderIndex}`;
                    
                    htmlStr += `
                        <div id="${headerId}" class="folder-header" onclick="toggleFolder('${headerId}', '${contentId}')">
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <input type="checkbox" class="folder-select-all" data-target="${contentId}" onclick="toggleFolderSelectAll(event, this)" style="width:auto; margin:0; cursor:pointer;">
                                <span>📂 ${folderName} <span style="font-size: 12px; color: #94a3b8;">(${items.length})</span></span>
                            </div>
                            <span class="toggle-icon">▼</span>
                        </div>
                        <div id="${contentId}" class="folder-content">
                    `;
                    
                    items.forEach(item => {
                        htmlStr += `
                            <div class="passage-row" style="background: rgba(0,0,0,0.15); border-radius: 0;">
                                <input type="checkbox" class="chk-item" value="${item.id}">
                                <span class="passage-title" title="${item.title}">${item.title}</span>
                                <div class="input-group">
                                    <label class="opt-label">순서</label>
                                    <input type="number" class="order-cnt" value="1" min="0">
                                    <label class="opt-label" style="margin-left:5px;">삽입</label>
                                    <input type="number" class="insert-cnt" value="1" min="0">
                                </div>
                                <div class="btn-group">
                                    <button class="btn-sm btn-edit" onclick="openEditModal('${item.id}')">수정</button>
                                    <button class="btn-sm btn-del" onclick="deletePassage('${item.id}')">삭제</button>
                                </div>
                            </div>`;
                    });
                    htmlStr += `</div>`;
                    folderIndex++;
                }
                container.innerHTML = htmlStr;
                
            } catch (err) {
                document.getElementById('passage-list').innerHTML = "<p style='text-align:center; color:#ffb199; padding:20px; font-weight:bold;'>서버 통신 오류가 발생했습니다.</p>";
            }
        };

        // 폴더 펼치기/접기 토글 함수
        function toggleFolder(headerId, contentId) {
            const header = document.getElementById(headerId);
            const content = document.getElementById(contentId);
            if (content.style.display === "none") {
                content.style.display = "block";
                header.classList.remove("collapsed");
            } else {
                content.style.display = "none";
                header.classList.add("collapsed");
            }
        }

        // [신규] 폴더별 전체 선택/해제 함수
        function toggleFolderSelectAll(event, checkbox) {
            event.stopPropagation(); // 폴더 아코디언이 접히는 것을 방지
            const contentId = checkbox.getAttribute('data-target');
            const contentDiv = document.getElementById(contentId);
            const checkboxes = contentDiv.querySelectorAll('.chk-item');
            checkboxes.forEach(chk => chk.checked = checkbox.checked);
        }

        function updateFolderDropdowns() {
            const selects = [document.getElementById('folder'), document.getElementById('bulk-folder'), document.getElementById('edit-folder')];
            selects.forEach(sel => {
                const currentVal = sel.value; 
                sel.innerHTML = "";
                globalFolders.forEach(f => {
                    const opt = document.createElement('option');
                    opt.value = f;
                    opt.text = f;
                    sel.appendChild(opt);
                });
                if(globalFolders.has(currentVal)) { sel.value = currentVal; }
            });
        }

        function createNewFolder() {
            const fName = prompt("생성할 새로운 폴더 이름을 입력하세요:");
            if (fName && fName.trim() !== "") {
                const cleanName = fName.trim();
                globalFolders.add(cleanName);
                updateFolderDropdowns();
                document.getElementById('folder').value = cleanName;
                document.getElementById('bulk-folder').value = cleanName;
                document.getElementById('edit-folder').value = cleanName;
            }
        }

        function toggleSelectAll() {
            const isChecked = document.getElementById('select-all').checked;
            // 모든 지문 체크박스 동기화
            document.querySelectorAll('.chk-item').forEach(chk => chk.checked = isChecked);
            // 모든 폴더 그룹 체크박스도 시각적으로 동기화
            document.querySelectorAll('.folder-select-all').forEach(chk => chk.checked = isChecked);
        }

        function applyGlobal() {
            const order = document.getElementById('global-order').value;
            const insert = document.getElementById('global-insert').value;
            document.querySelectorAll('.passage-row').forEach(row => {
                const orderInput = row.querySelector('.order-cnt');
                const insertInput = row.querySelector('.insert-cnt');
                if(orderInput && insertInput) {
                    orderInput.value = order;
                    insertInput.value = insert;
                }
            });
        }

        async function moveSelectedToFolder() {
            const folder = document.getElementById('bulk-folder').value;
            if (!folder) return alert("이동할 폴더를 선택하세요.");
            
            const selected = [];
            document.querySelectorAll('.chk-item:checked').forEach(chk => selected.push(chk.value));
            
            if(selected.length === 0) return alert("이동할 지문을 선택해주세요.");

            try {
                await fetch(GAS_URL, { 
                    method: "POST", 
                    headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                    body: JSON.stringify({ action: "update_folder", ids: selected, folder: folder }) 
                });
                location.reload();
            } catch (e) { alert("이동에 실패했습니다."); }
        }

        async function saveToDB() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const folder = document.getElementById('folder').value;
            if(!title || !content) return alert("제목과 내용을 모두 입력해주세요.");
            
            const saveBtn = document.getElementById('save-btn');
            saveBtn.innerText = "업로드 중입니다...";
            saveBtn.disabled = true;
            try {
                await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "save", title, content, folder }) });
                location.reload(); 
            } catch (e) { alert("저장에 실패했습니다."); } finally { saveBtn.innerText = "DB에 업로드하기"; saveBtn.disabled = false; }
        }

        async function deletePassage(id) {
            if(!confirm("이 지문을 완전히 삭제하시겠습니까?")) return;
            try {
                await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "delete", id: id }) });
                location.reload();
            } catch (e) { alert("삭제 오류"); }
        }

        async function openEditModal(id) {
            document.getElementById('edit-modal').style.display = 'flex';
            document.getElementById('edit-title').value = "로딩 중...";
            document.getElementById('edit-folder').value = "";
            document.getElementById('edit-content').value = "";
            document.getElementById('edit-id').value = id;
            try {
                const res = await fetch(GAS_URL + "?action=get_passage&id=" + id);
                const data = await res.json();
                
                if(data.folder && !globalFolders.has(data.folder)) {
                    globalFolders.add(data.folder);
                    updateFolderDropdowns();
                }
                
                document.getElementById('edit-title').value = data.title;
                document.getElementById('edit-folder').value = data.folder || "미분류";
                document.getElementById('edit-content').value = data.content;
            } catch(e) { closeEditModal(); }
        }

        function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }

        async function submitEdit() {
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('edit-title').value;
            const folder = document.getElementById('edit-folder').value;
            const content = document.getElementById('edit-content').value;
            
            if(!title || !content) return;
            document.getElementById('edit-submit-btn').disabled = true;
            try {
                await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "update", id, title, content, folder }) });
                location.reload();
            } catch (e) { document.getElementById('edit-submit-btn').disabled = false; }
        }

        async function generateIntegratedQuiz() {
            const selected = [];
            document.querySelectorAll('.chk-item:checked').forEach(chk => {
                const row = chk.closest('.passage-row');
                selected.push({ id: chk.value, order: row.querySelector('.order-cnt').value, insert: row.querySelector('.insert-cnt').value });
            });
            if(selected.length === 0) return alert("출제할 지문을 체크박스로 선택해주세요.");

            const quizDiv = document.getElementById('quiz-output');
            quizDiv.innerHTML = "<h3 style='text-align:center;'>AI가 문제를 생성하고 있습니다... ⚙️</h3>";
            quizDiv.style.display = "block";

            try {
                const res = await fetch(GAS_URL, { 
                    method: "POST", 
                    headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                    body: JSON.stringify({ action: "generate_batch", passages: selected }) 
                });
                const result = await res.json();
                
                let htmlOutput = result.html_content.replace("<h1 style='text-align:center; font-size: 26px; font-weight: 800; margin-bottom: 30px; letter-spacing: 2px;'>영어 모의고사 변형 문제지</h1>", "<h1 class='main-title'>영어 모의고사 변형 문제지</h1>");
                quizDiv.innerHTML = htmlOutput;
                document.getElementById('pdf-btn').style.display = "block";
            } catch(e) {
                quizDiv.innerHTML = "<p style='color:red;'>오류가 발생했습니다.</p>";
            }
        }

        function downloadPDF() {
            window.scrollTo(0, 0);
            html2pdf().set({ 
                margin: [15, 15, 15, 15], 
                filename: '영어_모의고사_변형문제.pdf', 
                html2canvas: { scale: 2, useCORS: true }, 
                jsPDF: { format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['css', 'legacy'] }
            }).from(document.getElementById('quiz-output')).save();
        }
    </script>
</body>
</html>
