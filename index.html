<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>영어 문제 은행</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f8f9fa; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; border-bottom: 2px solid #27ae60; padding-bottom: 10px; margin-top: 0; }
        
        /* 출제 목록 레이아웃 */
        .batch-control { display: flex; gap: 15px; align-items: center; background: #f1f3f5; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        .passage-row { display: grid; grid-template-columns: 30px 1fr 120px; align-items: center; padding: 12px; border-bottom: 1px solid #eee; gap: 10px; }
        .passage-title { font-size: 14px; font-weight: 600; color: #333; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .input-group { display: flex; gap: 8px; justify-content: flex-end; }
        .input-group input { width: 45px; padding: 4px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }

        /* 문제지 출력 스타일 (모의고사 느낌) */
        #quiz-output { padding: 40px; background: white; margin-top: 20px; border: 1px solid #ddd; display: none; }
        .q-box { border: 1px solid #999; padding: 20px; margin-bottom: 20px; border-radius: 8px; background: #fff; }
        .q-title { font-weight: bold; font-size: 1.1em; margin-bottom: 10px; display: block; }
        
        button { background-color: #27ae60; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold;}
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>💾 1. 새 지문 등록</h2>
            <input type="text" id="title" placeholder="지문 제목" style="width:100%; margin-bottom:10px; padding:10px; border:1px solid #ccc;">
            <textarea id="content" rows="5" style="width:100%; margin-bottom:10px; padding:10px; border:1px solid #ccc;" placeholder="영어 문장을 입력하세요."></textarea>
            <button id="save-btn" onclick="saveToDB()">DB에 저장하기</button>
        </div>

        <div class="card">
            <h2>📝 2. 출제할 지문 선택</h2>
            <div class="batch-control">
                <label>일괄 설정:</label>
                <input type="number" id="global-order" placeholder="순서" value="1">
                <input type="number" id="global-insert" placeholder="삽입" value="1">
                <button onclick="applyGlobal()" style="background:#555;">전체 적용</button>
            </div>
            <div id="passage-list">불러오는 중...</div>
            <button onclick="generateIntegratedQuiz()" style="background-color: #2980b9; margin-top:20px;">통합 문제지 생성</button>
        </div>

        <div id="quiz-output"></div>
        <button id="pdf-btn" onclick="downloadPDF()" style="display: none; background-color: #e74c3c;">📄 PDF 다운로드</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxqobTzwAkiFcSnqptg46xVHOtAJZwG1qf4f53BKZpK-yU-pqU4d_93cyuaM-Kr0YHV/exec";

        window.onload = async () => {
            const res = await fetch(GAS_URL + "?action=list");
            const list = await res.json();
            const container = document.getElementById('passage-list');
            container.innerHTML = "";
            list.forEach(item => {
                container.innerHTML += `
                    <div class="passage-row">
                        <input type="checkbox" class="chk-item" value="${item.id}">
                        <span class="passage-title">${item.title}</span>
                        <div class="input-group">
                            <label>순서:</label><input type="number" class="order-cnt" value="1">
                            <label>삽입:</label><input type="number" class="insert-cnt" value="1">
                        </div>
                    </div>`;
            });
        };

        function applyGlobal() {
            const order = document.getElementById('global-order').value;
            const insert = document.getElementById('global-insert').value;
            document.querySelectorAll('.passage-row').forEach(row => {
                row.querySelector('.order-cnt').value = order;
                row.querySelector('.insert-cnt').value = insert;
            });
        }

        async function generateIntegratedQuiz() {
            const selected = [];
            document.querySelectorAll('.passage-row').forEach(row => {
                const chk = row.querySelector('.chk-item');
                if(chk.checked) selected.push({ id: chk.value, order: row.querySelector('.order-cnt').value, insert: row.querySelector('.insert-cnt').value });
            });
            if(selected.length === 0) return alert("지문을 선택해주세요.");

            document.getElementById('quiz-output').innerHTML = "생성 중...";
            document.getElementById('quiz-output').style.display = "block";

            const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "generate_batch", passages: selected }) });
            const result = await res.json();
            
            // 문제지 출력 시 q-box 클래스 적용 (서버 응답 HTML도 이 클래스를 사용하도록 수정 필요)
            document.getElementById('quiz-output').innerHTML = result.html_content;
            document.getElementById('pdf-btn').style.display = "block";
        }

        function downloadPDF() {
            window.scrollTo(0, 0);
            html2pdf().set({ margin: 15, filename: '영어문제지.pdf', html2canvas: { scale: 2 }, jsPDF: { format: 'a4' } }).from(document.getElementById('quiz-output')).save();
        }
    </script>
</body>
</html>
